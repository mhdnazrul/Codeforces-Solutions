name: Build and Deploy Solution Archive

on:
  push:
    branches:
      - main

# ধাপ ১: 403 Error সমাধানের জন্য পারমিশন দেওয়া
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Python script to generate JSON and README
        run: python Web/generate.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update solutions.json and README.md"
          file_pattern: Web/solutions.json README.md
          # ধাপ ২: README কনফ্লিক্ট সমাধানের জন্য '.gitignore' বাইপাস করা
          add_options: '--force'
      
      # ধাপ ৩: 404 Error (Solution লিঙ্ক) সমাধানের জন্য ফাইল কপি করা
      - name: Prepare Website Files
        run: |
          echo "Preparing files..."
          
          # ক. Jekyll 404 Error সমাধানের জন্য .nojekyll ফাইল তৈরি
          touch Web/.nojekyll
          
          # খ. সল্যুশন ফোল্ডারগুলো কপি করা (সবচেয়ে সহজ উপায়ে)
          # || true কমান্ডটি নিশ্চিত করে যে ফোল্ডার খালি থাকলেও error দেবে না
          cp -r Solutions Web/ || true
          cp -r Gyms Web/ || true
          cp -r Groups Web/ || true
          
          # গ. ডিবাগিং: কপি হয়েছে কিনা তা চেক করা
          echo "Listing Web directory content to verify:"
          ls -F Web/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Web/'
          # ধাপ ৪: Multiple Artifacts Error সমাধানের জন্য ইউনিক নাম দেওয়া
          name: 'my-site-files'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # ধাপ ৪-এর ইউনিক নামটি ব্যবহার করা
          artifact_name: 'my-site-files'